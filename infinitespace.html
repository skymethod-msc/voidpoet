<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Coemergent System v4 — Living Criteria</title>
<style>
body { margin:0; background:black; overflow:hidden; }
canvas { display:block; }
#overlay {
  position: fixed;
  top: 20px;
  left: 20px;
  color: white;
  font-family: monospace;
  font-size: 12px;
  opacity: 0.6;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="overlay">click</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let t = 0;

// --- AUDIO ---
let audioCtx, osc, gain;
let smoothFreq = 200;
let smoothGain = 0;

window.onclick = () => {
  if(audioCtx) return;
  audioCtx = new AudioContext();
  osc = audioCtx.createOscillator();
  gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  gain.gain.value = 0;
  osc.start();
};

// --- PRIMITIVAS ---
const ops = [(a,b)=>a+b,(a,b)=>a-b,(a,b)=>a*b,(a,b)=>b? a/b:0];
const funcs = [Math.sin,Math.cos,Math.tanh];
const vars = ["u","v","t"];

// --- ÁRBOL ---
function randomNode(d=0){
  if(d>3 || Math.random()<0.3){
    let r = Math.random();
    if(r<0.33) return {type:"var", value: vars[Math.floor(Math.random()*3)]};
    if(r<0.66) return {type:"const", value: Math.random()*2-1};
    return {type:"func", fn: funcs[Math.floor(Math.random()*funcs.length)], arg: randomNode(d+1)};
  }
  return {
    type:"op",
    op: ops[Math.floor(Math.random()*ops.length)],
    left: randomNode(d+1),
    right: randomNode(d+1)
  };
}

function evalNode(n,u,v,t){
  try{
    if(n.type==="var") return n.value==="u"?u:n.value==="v"?v:t;
    if(n.type==="const") return n.value;
    if(n.type==="func") return n.fn(evalNode(n.arg,u,v,t));
    if(n.type==="op") return n.op(evalNode(n.left,u,v,t), evalNode(n.right,u,v,t));
  }catch{ return 0; }
}

function mutate(n, rate){
  if(Math.random()<rate) return randomNode();
  if(n.type==="op"){
    n.left = mutate(n.left,rate);
    n.right = mutate(n.right,rate);
  }
  if(n.type==="func"){
    n.arg = mutate(n.arg,rate);
  }
  return n;
}

function lerp(a,b,t){ return a+(b-a)*t; }

// --- MEMORIA PROFUNDA ---
let memory = [];
const MEMORY_SIZE = 12;

// --- PESOS EVOLUTIVOS ---
let weights = {
  stability: 0.4,
  energy: 0.3,
  novelty: 0.2,
  symmetry: 0.1
};

// --- MÉTRICAS ---
let prevFx = 0;

function computeMetrics(fx, fy, fc){

  let stability = 1 - Math.abs(fx - prevFx);
  let energy = Math.abs(fc);

  // simetría: comparar lados
  let symmetry = 1 - Math.abs(fx + fy);

  // novedad: distancia a memoria
  let novelty = 0;
  for(let m of memory){
    novelty += Math.abs(fx - m.fx);
  }
  novelty = memory.length ? novelty / memory.length : 1;

  prevFx = fx;

  return {stability, energy, novelty, symmetry};
}

// --- SCORE DINÁMICO ---
function computeScore(metrics){
  return (
    metrics.stability * weights.stability +
    metrics.energy * weights.energy +
    metrics.novelty * weights.novelty +
    metrics.symmetry * weights.symmetry
  );
}

// --- MUTACIÓN DE PESOS ---
function evolveWeights(score){
  let lr = 0.02;

  for(let k in weights){
    weights[k] += (Math.random()-0.5) * lr * score;
    weights[k] = Math.max(0, weights[k]);
  }

  // normalizar
  let sum = Object.values(weights).reduce((a,b)=>a+b,0);
  for(let k in weights){
    weights[k] /= sum;
  }
}

// --- ORGANISMO ---
let organism = {
  x: randomNode(),
  y: randomNode(),
  color: randomNode()
};

let target = JSON.parse(JSON.stringify(organism));
let blend = 0;

// --- LOOP ---
function draw(){

  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  let fx=0, fy=0, fc=0;

  for(let i=0;i<1000;i++){
    let u=Math.random()*2-1;
    let v=Math.random()*2-1;

    let x = lerp(
      evalNode(organism.x,u,v,t),
      evalNode(target.x,u,v,t),
      blend
    );

    let y = lerp(
      evalNode(organism.y,u,v,t),
      evalNode(target.y,u,v,t),
      blend
    );

    let c = lerp(
      evalNode(organism.color,u,v,t),
      evalNode(target.color,u,v,t),
      blend
    );

    if(!isFinite(x)||!isFinite(y)||!isFinite(c)) continue;

    fx+=x; fy+=y; fc+=c;

    let px = canvas.width/2 + x*250;
    let py = canvas.height/2 + y*250;

    let col = Math.floor((c+1)*127);
    col = Math.max(0,Math.min(255,col));

    ctx.fillStyle = `rgb(${col},120,${255-col})`;
    ctx.fillRect(px,py,1,1);
  }

  fx/=1000; fy/=1000; fc/=1000;

  let metrics = computeMetrics(fx,fy,fc);
  let score = computeScore(metrics);

  // --- AUDIO ---
  if(audioCtx){
    let f = 150 + fx*120 + metrics.novelty*80;
    let g = Math.min(0.05, metrics.energy*0.3);

    smoothFreq = lerp(smoothFreq,f,0.05);
    smoothGain = lerp(smoothGain,g,0.05);

    osc.frequency.setValueAtTime(smoothFreq, audioCtx.currentTime);
    gain.gain.setValueAtTime(smoothGain, audioCtx.currentTime);
  }

  blend += 0.003;

  if(blend>=1){

    // guardar experiencia
    memory.push({
      organism: JSON.parse(JSON.stringify(target)),
      fx: fx,
      score: score
    });

    memory.sort((a,b)=>b.score-a.score);
    memory = memory.slice(0,MEMORY_SIZE);

    evolveWeights(score);

    // elegir base
    let base = memory[Math.floor(Math.random()*memory.length)].organism;

    organism = base;

    target = {
      x: mutate(JSON.parse(JSON.stringify(base.x)),0.08),
      y: mutate(JSON.parse(JSON.stringify(base.y)),0.08),
      color: mutate(JSON.parse(JSON.stringify(base.color)),0.08)
    };

    blend = 0;
  }

  t+=0.01;
  requestAnimationFrame(draw);
}

draw();

</script>
</body>
</html>
