<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Coemergent System v3 — Memory</title>
<style>
  body { margin:0; background:black; overflow:hidden; }
  canvas { display:block; }
  #overlay {
    position: fixed;
    top: 20px;
    left: 20px;
    color: white;
    font-family: monospace;
    font-size: 12px;
    opacity: 0.6;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="overlay">click to activate sound</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const overlay = document.getElementById("overlay");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let t = 0;

// --- AUDIO ---
let audioCtx = null;
let osc, gain;

let smoothFreq = 220;
let smoothGain = 0;

function initAudio(){
  if(audioCtx) return;

  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  osc = audioCtx.createOscillator();
  gain = audioCtx.createGain();

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  gain.gain.value = 0;
  osc.start();

  overlay.innerText = "sound active";
}

window.addEventListener("click", initAudio);

// --- PRIMITIVAS ---
const ops = [
  (a,b)=>a+b,
  (a,b)=>a-b,
  (a,b)=>a*b,
  (a,b)=> b!==0 ? a/b : 0
];

const funcs = [
  Math.sin,
  Math.cos,
  Math.tan,
  Math.tanh
];

const vars = ["u","v","t"];

// --- ÁRBOL ---
function randomNode(depth=0){
  if(depth > 3 || Math.random() < 0.3){
    let type = Math.random();
    if(type < 0.33) return {type:"var", value: vars[Math.floor(Math.random()*vars.length)]};
    if(type < 0.66) return {type:"const", value: Math.random()*2-1};
    return {type:"func", fn: funcs[Math.floor(Math.random()*funcs.length)], arg: randomNode(depth+1)};
  }
  return {
    type:"op",
    op: ops[Math.floor(Math.random()*ops.length)],
    left: randomNode(depth+1),
    right: randomNode(depth+1)
  };
}

// --- EVALUAR ---
function evalNode(node, u,v,t){
  try{
    switch(node.type){
      case "var":
        return node.value==="u"?u:node.value==="v"?v:t;
      case "const":
        return node.value;
      case "func":
        return node.fn(evalNode(node.arg,u,v,t));
      case "op":
        return node.op(
          evalNode(node.left,u,v,t),
          evalNode(node.right,u,v,t)
        );
    }
  } catch(e){
    return 0;
  }
}

// --- MUTACIÓN ---
function mutate(node, rate=0.05){
  if(Math.random() < rate){
    return randomNode();
  }
  if(node.type==="op"){
    node.left = mutate(node.left, rate);
    node.right = mutate(node.right, rate);
  }
  if(node.type==="func"){
    node.arg = mutate(node.arg, rate);
  }
  return node;
}

// --- INTERPOLACIÓN ---
function lerp(a, b, t){
  return a + (b - a) * t;
}

// --- SCORE SIMPLE ---
let prevFx = 0;

function computeScore(fx, fy, fc){
  let stability = 1 - Math.abs(fx - prevFx);
  let energy = Math.abs(fc);

  prevFx = fx;

  return stability * 0.6 + energy * 0.4;
}

// --- MEMORIA ---
let memory = [];
const MEMORY_SIZE = 5;

// --- ORGANISMO ---
let organism = {
  x: randomNode(),
  y: randomNode(),
  color: randomNode()
};

let target = {
  x: randomNode(),
  y: randomNode(),
  color: randomNode()
};

let blend = 0;

// --- RENDER ---
function draw(){

  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  let fx = 0, fy = 0, fc = 0;

  for(let i=0;i<1200;i++){
    let u = Math.random()*2-1;
    let v = Math.random()*2-1;

    let x1 = evalNode(organism.x, u,v,t);
    let y1 = evalNode(organism.y, u,v,t);
    let c1 = evalNode(organism.color, u,v,t);

    let x2 = evalNode(target.x, u,v,t);
    let y2 = evalNode(target.y, u,v,t);
    let c2 = evalNode(target.color, u,v,t);

    let x = lerp(x1, x2, blend);
    let y = lerp(y1, y2, blend);
    let c = lerp(c1, c2, blend);

    if(!isFinite(x) || !isFinite(y) || !isFinite(c)) continue;

    fx += x;
    fy += y;
    fc += c;

    let px = canvas.width/2 + x*250;
    let py = canvas.height/2 + y*250;

    let col = Math.floor((c+1)*127);
    col = Math.max(0, Math.min(255, col));

    ctx.fillStyle = `rgb(${col},${100},${255-col})`;
    ctx.fillRect(px,py,1,1);
  }

  fx /= 1200;
  fy /= 1200;
  fc /= 1200;

  // --- SCORE ---
  let score = computeScore(fx, fy, fc);

  // --- AUDIO ---
  if(audioCtx){
    let targetFreq = 180 + fx * 120;
    let targetGain = Math.min(0.06, Math.abs(fc) * 0.4);

    smoothFreq = lerp(smoothFreq, targetFreq, 0.05);
    smoothGain = lerp(smoothGain, targetGain, 0.05);

    osc.frequency.setValueAtTime(smoothFreq, audioCtx.currentTime);
    gain.gain.setValueAtTime(smoothGain, audioCtx.currentTime);
  }

  // --- TRANSICIÓN ---
  blend += 0.002;

  if(blend >= 1){

    // guardar en memoria si es bueno
    memory.push({
      organism: JSON.parse(JSON.stringify(target)),
      score: score
    });

    // mantener solo mejores
    memory.sort((a,b)=>b.score - a.score);
    memory = memory.slice(0, MEMORY_SIZE);

    // elegir base desde memoria
    let base = memory.length > 0
      ? memory[Math.floor(Math.random()*memory.length)].organism
      : organism;

    organism = base;

    target = {
      x: mutate(JSON.parse(JSON.stringify(base.x)), 0.08),
      y: mutate(JSON.parse(JSON.stringify(base.y)), 0.08),
      color: mutate(JSON.parse(JSON.stringify(base.color)), 0.08)
    };

    blend = 0;
  }

  t += 0.01;
  requestAnimationFrame(draw);
}

draw();

</script>
</body>
</html>
